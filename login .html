<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Arbind Stationary</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #cef542;
      --dark: #0808d0e2;
      --light: #f9f6ef;
      --ink: #0b0b0b;
      --accent: #0a0a0a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--dark);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-box {
      background: var(--light);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--dark);
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 0.3rem;
    }
    .sub {
      text-align: center;
      color: #777;
      font-size: 0.85rem;
      margin-bottom: 1.8rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: #444;
    }
    input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.92rem;
      margin-bottom: 1.1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: var(--gold); }
    .field-error { border-color: #e74c3c !important; }

    .captcha-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.1rem;
    }
    .captcha-box {
      background: var(--dark);
      color: var(--gold);
      font-weight: 700;
      font-size: 1.1rem;
      padding: 0.7rem 1.2rem;
      border-radius: 6px;
      letter-spacing: 2px;
      white-space: nowrap;
      user-select: none;
    }
    .captcha-refresh {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #777;
    }
    .captcha-input { flex: 1; margin-bottom: 0; }

    .btn-login {
      width: 100%;
      background: var(--dark);
      color: var(--gold);
      border: none;
      padding: 0.9rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-login:hover { background: var(--accent); }

    .err-msg {
      color: #e74c3c;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 0.9rem;
      display: none;
    }
    .err-msg.show { display: block; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo">✒ Arbind Stationary</div>
  <div class="sub">Shopping shuru karne ke liye apni details daalein</div>

  <label>Aapka naam</label>
  <input type="text" id="loginName" placeholder="Aapka naam" />

  <label>Phone number</label>
  <input type="tel" id="loginPhone" placeholder="10-digit phone number" maxlength="10" />

  <label>Neeche wala sawal solve karo</label>
  <div class="captcha-row">
    <div class="captcha-box" id="captchaText">--</div>
    <button type="button" class="captcha-refresh" id="captchaRefresh" title="Naya sawal">🔄</button>
    <input type="number" id="captchaInput" class="captcha-input" placeholder="Jawab" />
  </div>

  <button class="btn-login" onclick="doLogin()">Login Karo</button>
  <p class="err-msg" id="errMsg"></p>
</div>

<script>
  let captchaAnswer = 0;

  function newCaptcha() {
    const a = Math.floor(Math.random() * 9) + 1;
    const b = Math.floor(Math.random() * 9) + 1;
    captchaAnswer = a + b;
    document.getElementById('captchaText').textContent = `${a} + ${b} =`;
    document.getElementById('captchaInput').value = '';
  }
  document.getElementById('captchaRefresh').addEventListener('click', newCaptcha);
  newCaptcha();

  function doLogin() {
    const nameEl    = document.getElementById('loginName');
    const phoneEl   = document.getElementById('loginPhone');
    const captchaEl = document.getElementById('captchaInput');
    const errMsg    = document.getElementById('errMsg');

    const name  = nameEl.value.trim();
    const phone = phoneEl.value.trim();
    const captchaVal = parseInt(captchaEl.value);

    [nameEl, phoneEl, captchaEl].forEach(el => el.classList.remove('field-error'));
    errMsg.classList.remove('show');

    if (!name) {
      nameEl.classList.add('field-error');
      errMsg.textContent = "⚠️ Apna naam daalein.";
      errMsg.classList.add('show');
      return;
    }
    if (!/^[6-9]\d{9}$/.test(phone)) {
      phoneEl.classList.add('field-error');
      errMsg.textContent = "⚠️ Sahi 10-digit phone number daalein.";
      errMsg.classList.add('show');
      return;
    }
    if (captchaVal !== captchaAnswer) {
      captchaEl.classList.add('field-error');
      errMsg.textContent = "⚠️ Sawal ka jawab galat hai, dobara try karein.";
      errMsg.classList.add('show');
      newCaptcha();
      return;
    }

    localStorage.setItem('customerLogin', JSON.stringify({
      name: name,
      phone: phone,
      loginTime: new Date().toISOString()
    }));

    // Login se pehle jis page pe jaana tha wahin bhej do, warna home pe
    const redirectTo = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
    sessionStorage.removeItem('redirectAfterLogin');
    window.location.href = redirectTo;
  }
</script>
</body>
</html>
