<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders – Arbind Stationary</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #cef542;
      --dark: #0808d0e2;
      --light: #f9f6ef;
      --ink: #0b0b0b;
      --accent: #0a0a0a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--light);
      color: var(--ink);
      min-height: 100vh;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(26,26,46,0.95);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(245,200,66,0.2);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.3rem;
      letter-spacing: 1px;
      text-decoration: none;
    }
    .nav-links a {
      color: #ccc;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }

    .page {
      max-width: 700px;
      margin: 2.5rem auto;
      padding: 0 1rem 4rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 0.4rem;
    }
    .underline {
      width: 50px; height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin-bottom: 2rem;
    }
    .note-line {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 1.8rem;
    }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: #999;
    }
    .empty a {
      display: inline-block;
      margin-top: 1.5rem;
      background: var(--dark);
      color: var(--gold);
      padding: 0.8rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }

    .order-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.3rem 1.4rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
    }
    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .order-date {
      font-size: 0.78rem;
      color: #999;
    }
    .order-total {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--accent);
    }
    .order-item-line {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      padding: 0.25rem 0;
      color: #444;
    }
    .order-delivery {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid #f0f0f0;
      font-size: 0.8rem;
      color: #777;
    }

    footer {
      background: rgba(26,26,46,0.95);
      color: #aaa;
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.82rem;
    }
    footer span { color: var(--gold); }

    .wa-float {
      position: fixed;
      bottom: 2rem; left: 2rem;
      background: #25d366;
      color: #fff;
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(7,218,84,0.5);
      z-index: 98;
      transition: transform 0.3s;
    }
    .wa-float:hover { transform: scale(1.1); }
  </style>
</head>
<body>
<script>
  if (!localStorage.getItem('customerLogin')) {
    sessionStorage.setItem('redirectAfterLogin', 'orders.html');
    window.location.href = 'login.html';
  }
</script>

<nav>
  <a href="index.html" class="logo">✒ Arbind Stationary</a>
  <div class="nav-links">
    <a href="index.html#products">Products</a>
    <a href="cart.html">🛒 Cart</a>
    <a href="orders.html">📦 My Orders</a>
    <a href="index.html#contact">Contact</a>
    <a href="#" onclick="localStorage.removeItem('customerLogin'); window.location.href='login.html';">🚪 Logout</a>
  </div>
</nav>

<div class="page">
  <h1>📦 My Orders</h1>
  <div class="underline"></div>
  <p class="note-line">Ye orders sirf isi phone/browser pe save rehte hain.</p>
  <div id="ordersBox"></div>
</div>

<a href="https://wa.me/917044726098" class="wa-float" target="_blank">💬</a>

<footer>
  <p>© 2026 <span>Arbind Stationary Store</span> — All Rights Reserved</p>
</footer>

<script>
  function formatDate(iso) {
    const d = new Date(iso);
    const opts = { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" };
    return d.toLocaleString("en-IN", opts);
  }

  function render() {
    const history = JSON.parse(localStorage.getItem("orderHistory")) || [];
    const box = document.getElementById("ordersBox");

    if (history.length === 0) {
      box.innerHTML = `
        <div class="empty">
          <div style="font-size:4rem;">📦</div>
          <p style="margin-top:1rem;font-size:1.1rem;">Abhi tak koi order nahi kiya!</p>
          <a href="index.html#products">🛍 Shopping Shuru Karein</a>
        </div>`;
      return;
    }

    let html = "";
    history.forEach((order) => {
      let itemLines = "";
      order.items.forEach((item) => {
        const qty = item.qty || 1;
        itemLines += `
          <div class="order-item-line">
            <span>${item.name} × ${qty}</span>
          </div>`;
      });

      html += `
        <div class="order-card">
          <div class="order-top">
            <div class="order-date">🕐 ${formatDate(order.date)}</div>
            <div class="order-total">₹${order.total}</div>
          </div>
          ${itemLines}
          <div class="order-delivery">
            📍 ${order.address || ""}${order.pincode ? " – " + order.pincode : ""}
          </div>
        </div>`;
    });

    box.innerHTML = html;
  }

  render();
</script>
</body>
</html>
